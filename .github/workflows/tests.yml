# 自测 CI：无头 Chrome 打开 tests.html——它会从 index.html 提取真实实现执行 98 项自测。
# 测的就是仓库里那份 index.html，与手动开 tests.html 完全同一条路径；无 npm、无额外依赖。
name: self-tests

on:
  push:
  pull_request:

jobs:
  self-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PATCHES.md：support.js 的 vendor 补丁一旦被重新生成覆盖，React 会退回 CDN（或 SRI 白屏）
      - name: 校验 support.js vendor 补丁未丢
        run: |
          grep -qF 'var REACT_URL = "./vendor/react.production.min.js"' support.js
          grep -qF 'var REACT_DOM_URL = "./vendor/react-dom.production.min.js"' support.js

      - name: headless Chrome 跑 tests.html
        run: |
          python3 -m http.server 8753 &
          sleep 1
          # --virtual-time-budget：跑完页面里的异步测试再 dump DOM
          google-chrome --headless=new --no-sandbox --disable-gpu \
            --virtual-time-budget=30000 --dump-dom \
            http://127.0.0.1:8753/tests.html > dom.html
          echo "summary: $(grep -o 'id="summary"[^<]*' dom.html || echo '<missing>')"
          if ! grep -q 'id="summary" class="ok">✓ 全部通过' dom.html; then
            echo '::error::自测未全部通过，失败项：'
            grep -o '<div class="row err">.*</div>' dom.html | head -40 || true
            exit 1
          fi
