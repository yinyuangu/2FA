<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Easy2FA — 核心算法自测</title>
<style>
  :root{ color-scheme: dark; }
  body{ margin:0; padding:32px; background:#06090c; color:#eaf2f5; font:14px/1.6 ui-monospace,SFMono-Regular,Menlo,Monaco,monospace; }
  h1{ font-size:18px; letter-spacing:.04em; }
  .note{ color:#9fb3bf; font-size:12px; margin:-6px 0 18px; }
  #summary{ font-size:16px; font-weight:700; padding:10px 14px; border-radius:10px; margin:14px 0; display:inline-block; }
  .ok{ background:rgba(52,211,153,.14); color:#34d399; border:1px solid rgba(52,211,153,.4); }
  .fail{ background:rgba(251,113,133,.14); color:#fb7185; border:1px solid rgba(251,113,133,.4); }
  .row{ padding:6px 10px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; gap:10px; }
  .row .s{ flex:none; width:48px; font-weight:700; }
  .pass .s{ color:#34d399; } .err .s{ color:#fb7185; }
  .err{ background:rgba(251,113,133,.06); }
  .d{ color:#9fb3bf; }
</style>
</head>
<body>
<h1>Easy2FA — 核心算法自测</h1>
<p class="note">这些纯函数镜像 <code>index.html</code>；改动其中的 TOTP / base32 / 迁移码解码逻辑后，请同步更新这里并重跑。<br>
需经 <b>localhost</b> 或 <b>HTTPS</b> 打开（Web Crypto 需要安全上下文；<code>file://</code> 不行）。</p>
<div id="summary">运行中…</div>
<div id="out"></div>

<script>
// ============================================================================
// 以下纯函数逐字镜像 index.html 的实现。改了一边记得同步另一边。
// ============================================================================
function base32Decode(b32){
  const A='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  b32=(b32||'').replace(/=+$/,'').replace(/\s/g,'').toUpperCase();
  if(!b32) return null;
  let bits=0,value=0; const out=[];
  for(const ch of b32){ const i=A.indexOf(ch); if(i<0) return null; value=(value<<5)|i; bits+=5; if(bits>=8){ out.push((value>>>(bits-8))&0xff); bits-=8; } }
  return out.length ? new Uint8Array(out) : null;
}
function base32Encode(bytes){
  const A='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let bits=0,value=0,out='';
  for(let i=0;i<bytes.length;i++){ value=(value<<8)|bytes[i]; bits+=8; while(bits>=5){ out+=A[(value>>>(bits-5))&31]; bits-=5; } }
  if(bits>0) out+=A[(value<<(5-bits))&31];
  return out;
}
async function totp(secret, time, digits, period, algorithm){
  const key=base32Decode(secret);
  if(!key) throw new Error('invalid');
  const counter=Math.floor(time/period);
  const buf=new ArrayBuffer(8); const dv=new DataView(buf);
  dv.setUint32(0,Math.floor(counter/0x100000000)); dv.setUint32(4,counter>>>0);
  const ck=await crypto.subtle.importKey('raw',key,{name:'HMAC',hash:algorithm},false,['sign']);
  const sig=new Uint8Array(await crypto.subtle.sign('HMAC',ck,buf));
  const off=sig[sig.length-1]&0x0f;
  const bin=((sig[off]&0x7f)<<24)|((sig[off+1]&0xff)<<16)|((sig[off+2]&0xff)<<8)|(sig[off+3]&0xff);
  return String(bin%Math.pow(10,digits)).padStart(digits,'0');
}
function utf8(bytes){ try{ return new TextDecoder().decode(bytes); }catch(e){ return ''; } }
function b64ToBytes(b64){
  try{ const bin=atob((b64||'').replace(/-/g,'+').replace(/_/g,'/')); const out=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i); return out; }
  catch(e){ return null; }
}
function decodeMigration(buf){
  const accounts=[]; let pos=0;
  const varint=()=>{ let r=0,sh=0,b; do{ b=buf[pos++]; r+=(b&0x7f)*Math.pow(2,sh); sh+=7; }while(b&0x80); return r; };
  const skip=(w)=>{ if(w===0){ while(buf[pos]&0x80) pos++; pos++; } else if(w===2){ const l=varint(); pos+=l; } else if(w===5) pos+=4; else if(w===1) pos+=8; };
  while(pos<buf.length){ const tag=varint(); const field=tag>>>3,wire=tag&7;
    if(field===1&&wire===2){ const len=varint(); const sub=buf.subarray(pos,pos+len); pos+=len; const a=decodeOtpParam(sub); if(a) accounts.push(a); }
    else skip(wire); }
  return accounts;
}
function decodeOtpParam(buf){
  let pos=0;
  const varint=()=>{ let r=0,sh=0,b; do{ b=buf[pos++]; r+=(b&0x7f)*Math.pow(2,sh); sh+=7; }while(b&0x80); return r; };
  const skip=(w)=>{ if(w===0){ while(buf[pos]&0x80) pos++; pos++; } else if(w===2){ const l=varint(); pos+=l; } else if(w===5) pos+=4; else if(w===1) pos+=8; };
  let secretBytes=null,name='',issuer='',algo=1,digitsEnum=1,type=2;
  while(pos<buf.length){ const tag=varint(); const field=tag>>>3,wire=tag&7;
    if(field===1&&wire===2){ const l=varint(); secretBytes=buf.subarray(pos,pos+l); pos+=l; }
    else if(field===2&&wire===2){ const l=varint(); name=utf8(buf.subarray(pos,pos+l)); pos+=l; }
    else if(field===3&&wire===2){ const l=varint(); issuer=utf8(buf.subarray(pos,pos+l)); pos+=l; }
    else if(field===4&&wire===0) algo=varint();
    else if(field===5&&wire===0) digitsEnum=varint();
    else if(field===6&&wire===0) type=varint();
    else skip(wire); }
  if(!secretBytes||!secretBytes.length) return null;
  if(type===1) return null;
  const digits=digitsEnum===1?6:digitsEnum===2?8:null;
  const algorithm=algo===1?'SHA-1':algo===2?'SHA-256':algo===3?'SHA-512':null;
  if(digits===null||algorithm===null) return null;
  return { secret: base32Encode(secretBytes), label:name, issuer, digits, period:30, algorithm, valid:true };
}

// ============================================================================
// 测试工具
// ============================================================================
const results=[];
function check(name, cond, detail){ results.push({name, ok:!!cond, detail: detail||''}); }
async function eq(name, got, want){ const g=await got; check(name, g===want, 'got '+JSON.stringify(g)+' / want '+JSON.stringify(want)); }
function ascii(s){ return new Uint8Array([...s].map(c=>c.charCodeAt(0))); }
function bytesEq(a,b){ if(!a||!b||a.length!==b.length) return false; for(let i=0;i<a.length;i++) if(a[i]!==b[i]) return false; return true; }
function varintEnc(n){ const b=[]; while(n>0x7f){ b.push((n&0x7f)|0x80); n=Math.floor(n/128); } b.push(n); return b; }
function pbField(tag,bytes){ return [tag, ...varintEnc(bytes.length), ...bytes]; }

async function run(){
  // ---- RFC 6238 Appendix B 向量（8 位、period 30）----
  const SHA1   = base32Encode(ascii('12345678901234567890'));
  const SHA256 = base32Encode(ascii('12345678901234567890123456789012'));
  const SHA512 = base32Encode(ascii('1234567890123456789012345678901234567890123456789012345678901234'));
  const vectors = [
    [59,          '94287082','46119246','90693936'],
    [1111111109,  '07081804','68084774','25091201'],
    [1111111111,  '14050471','67062674','99943326'],
    [1234567890,  '89005924','91819424','93441116'],
    [2000000000,  '69279037','90698825','38618901'],
  ];
  for(const [T,s1,s256,s512] of vectors){
    await eq('RFC6238 T='+T+' SHA-1',   totp(SHA1,  T,8,30,'SHA-1'),   s1);
    await eq('RFC6238 T='+T+' SHA-256', totp(SHA256,T,8,30,'SHA-256'), s256);
    await eq('RFC6238 T='+T+' SHA-512', totp(SHA512,T,8,30,'SHA-512'), s512);
  }

  // ---- base32 已知向量 + 往返 ----
  check('base32Decode("JBSWY3DPEHPK3PXP") = "Hello!"+deadbeef',
    bytesEq(base32Decode('JBSWY3DPEHPK3PXP'), new Uint8Array([0x48,0x65,0x6c,0x6c,0x6f,0x21,0xde,0xad,0xbe,0xef])));
  check('base32 大小写无关', bytesEq(base32Decode('jbswy3dpehpk3pxp'), base32Decode('JBSWY3DPEHPK3PXP')));
  check('base32Decode 非法字符 → null', base32Decode('JBSW!!!0189') === null);
  for(const arr of [[1],[0,255],[1,2,3,4,5],[72,101,108,108,111,33,222,173,190,239]]){
    const b=new Uint8Array(arr);
    check('base32 往返 ['+arr.join(',')+']', bytesEq(base32Decode(base32Encode(b)), b));
  }

  // ---- 迁移码解码：构造已知 payload → 解回来 ----
  const secretBytes=[...base32Decode('JBSWY3DPEHPK3PXP')];
  const otp=[...pbField(0x0A,secretBytes), ...pbField(0x12,[...ascii('bob')]), ...pbField(0x1A,[...ascii('Acme')]), 0x20,1, 0x28,1, 0x30,2];
  const payload=new Uint8Array(pbField(0x0A,otp));
  const accts=decodeMigration(payload);
  check('迁移码解出 1 个账号', accts.length===1, 'got '+accts.length);
  if(accts[0]){
    check('迁移码 secret 往返 = JBSWY3DPEHPK3PXP', accts[0].secret==='JBSWY3DPEHPK3PXP', 'got '+accts[0].secret);
    check('迁移码 name=bob', accts[0].label==='bob');
    check('迁移码 issuer=Acme', accts[0].issuer==='Acme');
    check('迁移码 digits=6', accts[0].digits===6);
    check('迁移码 algorithm=SHA-1', accts[0].algorithm==='SHA-1');
  }
  // HOTP（type=1）应被跳过
  const hotp=new Uint8Array(pbField(0x0A,[...pbField(0x0A,secretBytes), 0x30,1]));
  check('迁移码跳过 HOTP（type=1）', decodeMigration(hotp).length===0);

  render();
}

function render(){
  const out=document.getElementById('out');
  const passed=results.filter(r=>r.ok).length, total=results.length;
  const sum=document.getElementById('summary');
  sum.textContent = (passed===total ? '✓ 全部通过 ' : '✗ 有失败 ') + passed+' / '+total;
  sum.className = passed===total ? 'ok' : 'fail';
  out.innerHTML = results.map(r=>
    '<div class="row '+(r.ok?'pass':'err')+'"><span class="s">'+(r.ok?'PASS':'FAIL')+'</span><span>'+r.name+(r.ok?'':' <span class="d">— '+r.detail+'</span>')+'</span></div>'
  ).join('');
}

run().catch(e=>{
  document.getElementById('summary').textContent='✗ 运行出错：'+e.message+(/subtle/.test(e.message||'')?'（请用 localhost/HTTPS 打开）':'');
  document.getElementById('summary').className='fail';
});
</script>
</body>
</html>
